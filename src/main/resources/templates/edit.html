<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑无人机 - 无人机信息管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">
        <nav class="navbar app-header">
            <span class="navbar-brand text-white">无人机信息管理系统</span>
            <a href="/uav/list" class="btn btn-outline-light btn-sm">返回列表</a>
        </nav>

        <main class="page-main">
            <div class="card shadow-sm" style="max-width:820px;margin:0 auto;">
                <div class="card-body">
                    <h5 class="card-title mb-4">编辑无人机</h5>

                    <form method="post" th:action="'/uav/edit/' + ${request.id}">
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>注册编号</label>
                                <input type="text" class="form-control" readonly
                                       th:value="${request.uavCode}">
                                <small class="text-muted">注册编号不可修改</small>
                            </div>
                            <div class="form-group col-md-6">
                                <label>型号 <span class="text-danger">*</span></label>
                                <input type="text" name="model" class="form-control" required maxlength="100"
                                       th:value="${request.model}">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>制造商</label>
                            <input type="text" name="manufacturer" class="form-control" maxlength="100"
                                   th:value="${request.manufacturer}">
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>最大载重 (kg)</label>
                                <input type="number" step="0.1" name="maxPayload" class="form-control"
                                       th:value="${request.maxPayload}">
                            </div>
                            <div class="form-group col-md-4">
                                <label>最大高度 (m)</label>
                                <input type="number" name="maxAltitude" class="form-control"
                                       th:value="${request.maxAltitude}">
                            </div>
                            <div class="form-group col-md-4">
                                <label>续航 (min)</label>
                                <input type="number" name="maxFlightTime" class="form-control"
                                       th:value="${request.maxFlightTime}">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>最大速度 (m/s)</label>
                                <input type="number" step="0.1" name="maxSpeed" class="form-control"
                                       th:value="${request.maxSpeed}">
                            </div>
                            <div class="form-group col-md-4">
                                <label>翼展 (cm)</label>
                                <input type="number" step="0.1" name="wingspan" class="form-control"
                                       th:value="${request.wingspan}">
                            </div>
                            <div class="form-group col-md-4">
                                <label>自重 (kg)</label>
                                <input type="number" step="0.1" name="weight" class="form-control"
                                       th:value="${request.weight}">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-4">
                                <label>状态</label>
                                <select name="status" class="form-control">
                                    <option value="1" th:selected="${request.status == 1}">正常</option>
                                    <option value="0" th:selected="${request.status == 0}">停用</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>备注 <small class="text-muted" id="remarkCount">0/500</small></label>
                            <textarea name="remark" id="remark" class="form-control" rows="3" maxlength="500"
                                      th:text="${request.remark}"></textarea>
                        </div>
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">保存修改</button>
                            <a href="/uav/list" class="btn btn-secondary ml-2">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
    document.getElementById('remark').addEventListener('input', function() {
        document.getElementById('remarkCount').textContent = this.value.length + '/500';
    });
    document.getElementById('remarkCount').textContent = document.getElementById('remark').value.length + '/500';
    </script>
</body>
</html>
