<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 无人机信息管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card card shadow">
            <div class="card-body text-center">
                <div class="brand-mark mb-3">UAV</div>
                <h1 class="mb-4">无人机信息管理系统</h1>
                <form method="post" action="/api/auth/login" id="loginForm">
                    <div class="form-group">
                        <input type="text" name="username" class="form-control form-control-lg"
                               placeholder="用户名" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <input type="password" name="password" class="form-control form-control-lg"
                               placeholder="密码" required autocomplete="current-password">
                    </div>
                    <div class="text-danger mb-3" id="errorMsg" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary btn-lg btn-block">登录</button>
                </form>
            </div>
        </div>
    </div>
    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var form = this;
        var data = {
            username: form.username.value,
            password: form.password.value
        };
        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
            credentials: 'include'
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 200) {
                window.location.href = '/uav/list';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('errorMsg').textContent = res.msg || '登录失败';
            }
        });
    });
    </script>
</body>
</html>
