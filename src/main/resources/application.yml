spring:
  profiles:
    active: sqlite
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

server:
  port: 8080
  servlet:
    context-path: /

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.uav.domain.entity
  type-handlers-package: com.example.uav.config.typehandler
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-statement-timeout: 30

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

shiro:
  loginUrl: /login
  successUrl: /uav/list
  unauthorizedUrl: /403
  sessionManager:
    globalSessionTimeout: 1800000

logging:
  level:
    com.example.uav: debug
    com.example.uav.mapper: debug

druid:
  stat-view-servlet:
    login-username: admin
    login-password: admin123
    allow: 127.0.0.1,::1
